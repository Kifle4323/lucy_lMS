services:
  - type: web
    name: lucy-lms-api
    env: node
    region: oregon
    plan: free
    buildCommand: apt-get update && apt-get install -y python3 python3-pip libreoffice-writer libreoffice-impress libreoffice-calc && cd apps/api && npm install && npx prisma generate && npm run build
    startCommand: cd apps/api && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 10000
      - key: ML_SERVICE_URL
        fromService:
          name: lucy-ml-service
          type: web
          property: hostport

  - type: web
    name: lucy-ml-service
    env: python
    region: oregon
    plan: free
    buildCommand: cd apps/ml && pip install -r requirements.txt
    startCommand: cd apps/ml && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        sync: false
