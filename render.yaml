services:
  - type: web
    name: lucy-lms-api
    env: node
    region: oregon
    plan: free
    buildCommand: apt-get update && apt-get install -y python3 python3-pip libreoffice-writer libreoffice-impress libreoffice-calc && pip3 install python-pptx Pillow && cd apps/api && npm install && npx prisma generate && npm run build
    startCommand: cd apps/api && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 10000
